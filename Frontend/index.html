<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json">

<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

<meta name="theme-color" content="#000000">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black">

<meta name="apple-mobile-web-app-title" content="Bloop">
  </head>
  <body>
    <div id="root">
      <!-- PWA Splash Screen (automatically replaced when React mounts) -->
      <div id="pwa-splash" style="position: fixed; inset: 0; background: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #ffffff; user-select: none;">
        <div style="width: 96px; height: 96px; border-radius: 28px; background: linear-gradient(135deg, #a78bfa 0%, #f472b6 50%, #22d3ee 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 30px rgba(167, 139, 250, 0.45); margin-bottom: 24px; animation: pulse-logo 2s infinite ease-in-out;">
          <span style="font-size: 42px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));">💬</span>
        </div>
        <h1 style="font-size: 28px; font-weight: 800; tracking: tight; margin: 0; background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Bloop</h1>
        <p style="font-size: 11px; color: #a1a1aa; margin-top: 8px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;">Realtime Connect</p>
        
        <style>
          @keyframes pulse-logo {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(167, 139, 250, 0.2)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 0 25px rgba(167, 139, 250, 0.5)); }
          }
        </style>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration & Installation Helper -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((reg) => {
              console.log('[PWA] Service Worker registered successfully:', reg.scope);
              
              // Handle update checking
              reg.onupdatefound = () => {
                const installingWorker = reg.installing;
                if (installingWorker) {
                  installingWorker.onstatechange = () => {
                    if (installingWorker.state === 'installed') {
                      if (navigator.serviceWorker.controller) {
                        console.log('[PWA] New version detected, reloading app shell...');
                        window.location.reload();
                      }
                    }
                  };
                }
              };
            })
            .catch((err) => {
              console.error('[PWA] Service Worker registration failed:', err);
            });
        });
      }

      // Intercept beforeinstallprompt for install prompt decks
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        window.deferredPrompt = e;
        console.log("[PWA] Installation prompt available.");
        window.dispatchEvent(new CustomEvent('pwa-installable'));
      });

      // Reset prompt once installed
      window.addEventListener('appinstalled', () => {
        console.log('[PWA] Bloop successfully installed.');
        window.deferredPrompt = null;
      });
    </script>
  </body>
</html>
